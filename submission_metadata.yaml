# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Claude Code was used as a pair programmer throughout: spec analysis,
  architecture discussion, implementation, code review, and test writing.
  All design decisions (two-stage ranking, scoring weights, honeypot rules)
  were reviewed and are defensible by the author. No candidate data was sent
  to any hosted LLM; the ranking pipeline itself makes no LLM or API calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-stage ranking mirroring a production retrieval system. Stage A screens
  all 100K candidates on cheap features: concept coverage over a hand-built
  skill ontology (word-boundary matched, endorsement/duration-trusted against
  keyword-stuffers), recruiter-style career-trajectory scoring with the JD's
  explicit negative signals (consulting-only, pure research, CV/speech/
  robotics-only, LangChain-only, title-chasing job-hoppers), behavioral
  engagement, city-tier location fit, and availability. Stage B re-ranks the
  top 2,000 with true semantic similarity (BAAI/bge-small-en-v1.5, local CPU,
  offline) against a surface-form-expanded JD document, blended
  0.40 semantic + 0.30 career + 0.15 behavioral + 0.10 location +
  0.05 availability. A honeypot detector (tenure impossibilities,
  date inconsistencies, zero-usage "expert" stacks, assessment contradictions)
  zeroes fakes out of the top 100. Reasoning is generated per rank band from
  actual profile fields. Fully deterministic: data-derived reference date,
  hash-seeded phrasing, candidate_id tie-breaks. ~3 minutes end-to-end on an
  8-core CPU laptop.

# ============================================================================
